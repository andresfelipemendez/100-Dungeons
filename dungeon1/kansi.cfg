# kansi watch+rebuild config for dungeon1 (see C:/Users/andres/Development/kansi)
# the exe loads this at startup; saving any watched file rebuilds the dll,
# then the exe's reload loop (+ seni migration) hot-swaps it. paths are
# relative to the project root (the exe pins its cwd there).
# pre_newer <in> <out> <cmd> steps are skipped when <out> is already newer.

watch src
watch ../engine/src
ext .c .h .vert .frag

# snapshot the hot-state header: #include and .incbin must read the same
# bytes even if src/game_state.h is saved mid-compile
pre_newer src/game_state.h build/game_state.h copy /y src\game_state.h build\game_state.h

# shaders: recompiled only when the source is newer than the bytecode
pre_newer src/shaders/model.vert build/model.vert.spv C:\VulkanSDK\1.4.341.1\Bin\glslc.exe src/shaders/model.vert -o build/model.vert.spv
pre_newer src/shaders/model.frag build/model.frag.spv C:\VulkanSDK\1.4.341.1\Bin\glslc.exe src/shaders/model.frag -o build/model.frag.spv
pre_newer ../engine/src/engine/render/shaders/ui.vert build/ui.vert.spv C:\VulkanSDK\1.4.341.1\Bin\glslc.exe ../engine/src/engine/render/shaders/ui.vert -o build/ui.vert.spv
pre_newer ../engine/src/engine/render/shaders/ui.frag build/ui.frag.spv C:\VulkanSDK\1.4.341.1\Bin\glslc.exe ../engine/src/engine/render/shaders/ui.frag -o build/ui.frag.spv

# vendor implementations (clay/cgltf/stb): recompiled only when their unity
# file changes; otherwise the prebuilt object is just linked
pre_newer ../engine/src/engine/vendor_impl.c build/vendor_impl.o gcc -c -O1 ../engine/src/engine/vendor_impl.c -I../vendor/cgltf -I../vendor/stb -I../vendor/clay -o build/vendor_impl.o

# ui.c: the one engine file that speaks clay (C99 macro API), compiled into
# its own object and linked; rebuilt when ui.c / ui.h / clay.h change
pre_newer ../engine/src/engine/ui/ui.c build/ui.o gcc -c -g0 -O0 -pipe -std=c99 ../engine/src/engine/ui/ui.c -I../engine/src -I../vendor/clay -I../vendor/stb -I../vendor/SDL3-mingw/x86_64-w64-mingw32/include -o build/ui.o
pre_newer ../engine/src/engine/ui/ui.h build/ui.o gcc -c -g0 -O0 -pipe -std=c99 ../engine/src/engine/ui/ui.c -I../engine/src -I../vendor/clay -I../vendor/stb -I../vendor/SDL3-mingw/x86_64-w64-mingw32/include -o build/ui.o
pre_newer ../vendor/clay/clay.h build/ui.o gcc -c -g0 -O0 -pipe -std=c99 ../engine/src/engine/ui/ui.c -I../engine/src -I../vendor/clay -I../vendor/stb -I../vendor/SDL3-mingw/x86_64-w64-mingw32/include -o build/ui.o

# precompiled header: vendor declarations parsed once, not per save. The
# .gch MUST be built with exactly the dll's compile flags + include dirs.
# Regenerated when pch.h changes.
pre_newer src/pch.h build/pch.h copy /y src\pch.h build\pch.h
pre_newer build/pch.h build/pch.h.gch gcc -x c-header -g0 -O0 -pipe -std=c99 build/pch.h -Ibuild -Isrc -I../engine/src -I../vendor/cgltf -I../vendor/stb -I../vendor/clay -I../vendor/SDL3-mingw/x86_64-w64-mingw32/include -I../vendor/seni -o build/pch.h.gch

source src/game_unity.c
obj build/vendor_impl.o
obj build/ui.o
include build
include src
include ../engine/src
include ../vendor/cgltf
include ../vendor/stb
include ../vendor/clay
include ../vendor/SDL3-mingw/x86_64-w64-mingw32/include
include ../vendor/seni
libdir ../vendor/SDL3-mingw/x86_64-w64-mingw32/lib
lib SDL3
flag -g0
flag -O0
flag -pipe
flag -std=c99
flag -include build/pch.h

out build/game_new.dll
tmp build/game_tmp.dll
log build/kansi.log
debounce_ms 30
