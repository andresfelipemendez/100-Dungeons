# kaji (鍛冶) build description for dungeon1 -- the single source of build
# truth on every platform. Replaces all per-OS build scripts.
#   ${B} = platform build dir, ${SO} = .dll/.so, ${EXE} = .exe/empty
#   keys suffixed _win/_linux apply on one OS only
# Targets the host uses:
#   game  -- the reloadable unit (kansi's change edge force-builds this)
#   ship  -- standalone bundle: runtime_main + engine + game, no dev machinery
# CLI: meikyu --build [game|ship|...]

builddir build
builddir_linux build-linux
builddir_mac build-mac

tool glslc C:\VulkanSDK\1.4.341.1\Bin\glslc.exe
tool_linux glslc glslc
tool_mac glslc glslc

# snapshot the hot-state header: #include and seni's .incbin must read the
# same bytes even if src/game_state.h is saved mid-compile
target snapshot copy
  in src/game_state.h
  out ${B}/game_state.h

target model_vert shader
  in src/shaders/model.vert
  out ${B}/model.vert.spv
target model_frag shader
  in src/shaders/model.frag
  out ${B}/model.frag.spv
target ui_vert shader
  in ../meikyu/src/engine/render/shaders/ui.vert
  out ${B}/ui.vert.spv
target ui_frag shader
  in ../meikyu/src/engine/render/shaders/ui.frag
  out ${B}/ui.frag.spv

# vendor implementations (clay/cgltf/stb): compiled once, relinked per build
target vendor_impl object
  in ../meikyu/src/engine/vendor_impl.c
  out ${B}/vendor_impl.o
  flag -O1
  include ../vendor/cgltf ../vendor/stb ../vendor/clay

# ui.c: the one engine file that speaks clay (C99 macro API)
target ui object
  in ../meikyu/src/engine/ui/ui.c
  also ../meikyu/src/engine/ui/ui.h ../vendor/clay/clay.h
  out ${B}/ui.o
  flag -g0 -O0 -pipe -std=c99
  include ../meikyu/src ../vendor/clay ../vendor/stb
  include ../vendor/SDL3-mingw/x86_64-w64-mingw32/include

# editor: dev-only tooling, linked only into the game dll (never ship)
target editor object
  in ../meikyu/src/editor/editor_unity.c
  also ../meikyu/src/editor/editor.c ../meikyu/src/editor/editor.h
  also ../meikyu/src/editor/panels/inspector.c ../meikyu/src/editor/panels/build_panel.c
  also ../vendor/seni/seni.c ../vendor/seni/seni.h ../vendor/seni/arena.c
  out ${B}/editor.o
  flag -g0 -O0 -pipe -std=c99
  include ../meikyu/src/editor ../meikyu/src ../vendor/seni
  include ../vendor/SDL3-mingw/x86_64-w64-mingw32/include

# precompiled header: vendor declarations parsed once, not per save.
# MUST be compiled with exactly the dll's flags + include dirs.
target pch_snapshot copy
  in src/pch.h
  out ${B}/pch.h
target pch pch
  dep pch_snapshot
  in ${B}/pch.h
  out ${B}/pch.h.gch
  flag -g0 -O0 -pipe -std=c99
  include ${B} src ../meikyu/src ../vendor/cgltf ../vendor/stb ../vendor/clay
  include ../vendor/SDL3-mingw/x86_64-w64-mingw32/include ../vendor/seni

# the reloadable unit. The host force-builds this on kansi's change edge:
# a unity build's staleness lives in headers no list can enumerate, the
# watcher's word is the truth. Published atomically (tmp -> out).
target game dll
  dep snapshot model_vert model_frag ui_vert ui_frag vendor_impl ui editor pch
  in src/game_unity.c
  out ${B}/game_new${SO}
  obj ${B}/vendor_impl.o ${B}/ui.o ${B}/editor.o
  flag -g0 -O0 -pipe -Wall -Wextra -std=c99
  flag -include ${B}/pch.h
  define EDITOR_BUILD
  include ${B} src ../meikyu/src ../meikyu/src/editor
  include ../vendor/cgltf ../vendor/stb ../vendor/clay ../vendor/seni
  include ../vendor/SDL3-mingw/x86_64-w64-mingw32/include
  libdir_win ../vendor/SDL3-mingw/x86_64-w64-mingw32/lib
  lib_win SDL3
  lib_linux m
  lib_mac m
  # mac two-level namespace: SDL symbols resolve at dlopen from the
  # already-loaded libSDL3 (linux gets this for free via flat namespace)
  flag_mac -Wl,-undefined,dynamic_lookup

# the dev host exe itself: after bootstrap, even the platform binary is a
# kaji target. Builds beside the running exe (which holds its own file
# lock); swap by quitting and renaming, or rerun bootstrap.
#     meikyu --build host  ->  ${B}/meikyu_new${EXE}
target host exe
  in ../meikyu/src/platform/host_main.c
  in ../vendor/seni/seni.c ../vendor/seni/arena.c
  in ../vendor/kansi/kansi.c ../vendor/kaji/kaji.c
  in ../vendor/dodai/dodai_video_sdl.c
  in_win ../vendor/dodai/dodai_windows.c
  in_linux ../vendor/dodai/dodai_posix.c
  in_mac ../vendor/dodai/dodai_posix.c
  out ${B}/meikyu_new${EXE}
  flag -g -O0 -Wall -Wextra -std=c99
  include src ../meikyu/src ../vendor/seni ../vendor/kansi ../vendor/kaji ../vendor/dodai
  include ../vendor/SDL3-mingw/x86_64-w64-mingw32/include
  libdir_win ../vendor/SDL3-mingw/x86_64-w64-mingw32/lib
  lib_win SDL3
  libdir_linux ${B}/_deps/sdl3-build
  lib_linux SDL3 m pthread
  flag_linux -Wl,-rpath,'$ORIGIN/_deps/sdl3-build'
  libdir_mac ${B}/_deps/sdl3-build
  lib_mac SDL3 m pthread
  flag_mac -Wl,-rpath,@loader_path/_deps/sdl3-build

# standalone bundle: runtime host + engine + game statically, no editor,
# no kansi, no seni driver. Mirrors the dev tree (exe at the bundle root,
# compiled shaders under the platform build dir name) so game code paths
# work unchanged; ASSETS_DIR is overridden to the bundled copy.
target ship exe
  dep snapshot model_vert model_frag ui_vert ui_frag vendor_impl ui
  in ../meikyu/src/platform/runtime_main.c src/game_unity.c
  in ../vendor/dodai/dodai_video_sdl.c
  in_win ../vendor/dodai/dodai_windows.c
  in_linux ../vendor/dodai/dodai_posix.c
  in_mac ../vendor/dodai/dodai_posix.c
  out ${B}/ship/dungeon${EXE}
  obj ${B}/vendor_impl.o ${B}/ui.o
  flag -O2 -std=c99
  define NDEBUG ASSETS_DIR=\"assets\"
  include ${B} src ../meikyu/src ../vendor/dodai
  include ../vendor/cgltf ../vendor/stb ../vendor/clay ../vendor/seni
  include ../vendor/SDL3-mingw/x86_64-w64-mingw32/include
  libdir_win ../vendor/SDL3-mingw/x86_64-w64-mingw32/lib
  lib_win SDL3
  libdir_linux ${B}/_deps/sdl3-build
  lib_linux SDL3 m pthread
  flag_linux -Wl,-rpath,'$ORIGIN'
  libdir_mac ${B}/_deps/sdl3-build
  lib_mac SDL3 m pthread
  flag_mac -Wl,-rpath,@loader_path
  post copy ${B}/model.vert.spv ${B}/ship/${B}/model.vert.spv
  post copy ${B}/model.frag.spv ${B}/ship/${B}/model.frag.spv
  post copy ${B}/ui.vert.spv ${B}/ship/${B}/ui.vert.spv
  post copy ${B}/ui.frag.spv ${B}/ship/${B}/ui.frag.spv
  post_win copy ../vendor/SDL3-mingw/x86_64-w64-mingw32/bin/SDL3.dll ${B}/ship/SDL3.dll
  post_linux copy ${B}/_deps/sdl3-build/libSDL3.so.0 ${B}/ship/libSDL3.so.0
  post_mac copy ${B}/_deps/sdl3-build/libSDL3.0.dylib ${B}/ship/libSDL3.0.dylib
  post copydir ../assets ${B}/ship/assets
