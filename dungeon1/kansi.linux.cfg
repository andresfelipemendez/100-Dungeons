# kansi watch+rebuild config for dungeon1 on Linux (the exe picks this file
# on non-Windows). Mirrors kansi.cfg; kept in sync by hand.
# Note: on WSL with the repo under /mnt/c, inotify is silently dead (9p);
# kansi detects that and falls back to polling automatically.
# The game .so links without libSDL3 -- symbols resolve at dlopen time
# against the SDL the exe already loaded. The vendored SDL3-mingw *headers*
# are platform-neutral and reused here.

watch src
watch ../engine/src
ext .c .h .vert .frag

# snapshot the hot-state header: #include and .incbin must read the same
# bytes even if src/game_state.h is saved mid-compile
pre_newer src/game_state.h build-linux/game_state.h cp -f src/game_state.h build-linux/game_state.h

# shaders: recompiled only when the source is newer than the bytecode
pre_newer src/shaders/model.vert build-linux/model.vert.spv glslc src/shaders/model.vert -o build-linux/model.vert.spv
pre_newer src/shaders/model.frag build-linux/model.frag.spv glslc src/shaders/model.frag -o build-linux/model.frag.spv
pre_newer ../engine/src/engine/render/shaders/ui.vert build-linux/ui.vert.spv glslc ../engine/src/engine/render/shaders/ui.vert -o build-linux/ui.vert.spv
pre_newer ../engine/src/engine/render/shaders/ui.frag build-linux/ui.frag.spv glslc ../engine/src/engine/render/shaders/ui.frag -o build-linux/ui.frag.spv

# vendor implementations (clay/cgltf/stb): compiled once, relinked per build
pre_newer ../engine/src/engine/vendor_impl.c build-linux/vendor_impl.o gcc -c -O1 -fPIC ../engine/src/engine/vendor_impl.c -I../vendor/cgltf -I../vendor/stb -I../vendor/clay -o build-linux/vendor_impl.o

# ui.c: the one engine file that speaks clay (C99 macro API)
pre_newer ../engine/src/engine/ui/ui.c build-linux/ui.o gcc -c -g0 -O0 -pipe -std=c99 -fPIC ../engine/src/engine/ui/ui.c -I../engine/src -I../vendor/clay -I../vendor/stb -I../vendor/SDL3-mingw/x86_64-w64-mingw32/include -o build-linux/ui.o
pre_newer ../engine/src/engine/ui/ui.h build-linux/ui.o gcc -c -g0 -O0 -pipe -std=c99 -fPIC ../engine/src/engine/ui/ui.c -I../engine/src -I../vendor/clay -I../vendor/stb -I../vendor/SDL3-mingw/x86_64-w64-mingw32/include -o build-linux/ui.o
pre_newer ../vendor/clay/clay.h build-linux/ui.o gcc -c -g0 -O0 -pipe -std=c99 -fPIC ../engine/src/engine/ui/ui.c -I../engine/src -I../vendor/clay -I../vendor/stb -I../vendor/SDL3-mingw/x86_64-w64-mingw32/include -o build-linux/ui.o

# precompiled header: vendor declarations parsed once, not per save.
# The .gch MUST be built with exactly the .so's compile flags + include dirs.
pre_newer src/pch.h build-linux/pch.h cp -f src/pch.h build-linux/pch.h
pre_newer build-linux/pch.h build-linux/pch.h.gch gcc -x c-header -g0 -O0 -pipe -std=c99 -fPIC build-linux/pch.h -Ibuild-linux -Isrc -I../engine/src -I../vendor/cgltf -I../vendor/stb -I../vendor/clay -I../vendor/SDL3-mingw/x86_64-w64-mingw32/include -I../vendor/seni -o build-linux/pch.h.gch

source src/game_unity.c
obj build-linux/vendor_impl.o
obj build-linux/ui.o
include build-linux
include src
include ../engine/src
include ../vendor/cgltf
include ../vendor/stb
include ../vendor/clay
include ../vendor/SDL3-mingw/x86_64-w64-mingw32/include
include ../vendor/seni
lib m
flag -g0
flag -O0
flag -pipe
flag -std=c99
flag -fPIC
flag -include build-linux/pch.h

out build-linux/game_new.so
tmp build-linux/game_tmp.so
log build-linux/kansi.log
debounce_ms 30
